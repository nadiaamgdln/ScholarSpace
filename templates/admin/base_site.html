{% extends "admin/base.html" %}
{% load static %}
{% block title %}{{ title }} | ScholarSpace Admin{% endblock %}
{% block extrahead %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --b1:#1648c8;--b2:#0cb4e8;--grad:linear-gradient(135deg,#1648c8,#0cb4e8);
  --bg:#e8eeff;--card:rgba(255,255,255,0.78);--border:rgba(22,72,200,0.15);
  --tx:#07112a;--mu:#4b5a7a;--lt:#7e8fa8;
  --green:#047857;--red:#c81515;--amber:#b45309;
  --sh:0 4px 16px rgba(22,72,200,.13);
}
*{box-sizing:border-box}
body{
  font-family:'Inter',sans-serif!important;
  background:var(--bg)!important;color:var(--tx)!important;
  background-image:
    radial-gradient(ellipse 70% 50% at -5% -5%,rgba(22,72,200,.18) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 105% 105%,rgba(12,180,232,.14) 0%,transparent 55%)!important;
  background-attachment:fixed!important;
}
/* ── Header ── */
#header{
  background:rgba(232,238,255,.85)!important;backdrop-filter:blur(22px)!important;
  border-bottom:1px solid rgba(255,255,255,.75)!important;
  padding:0 1.5rem!important;height:56px!important;
  display:flex!important;align-items:center!important;justify-content:space-between!important;
  box-shadow:0 1px 0 rgba(22,72,200,.10),0 4px 16px rgba(22,72,200,.08)!important;
}
#branding h1,#branding h1 a{
  font-family:'Sora',sans-serif!important;font-size:1.1rem!important;font-weight:800!important;
  background:var(--grad)!important;-webkit-background-clip:text!important;
  -webkit-text-fill-color:transparent!important;background-clip:text!important;
  text-decoration:none!important;
}
#user-tools{color:var(--mu)!important;font-size:.8rem!important}
#user-tools a{color:var(--b1)!important;font-weight:600!important;text-decoration:none!important}
/* ── Breadcrumbs ── */
div.breadcrumbs{
  background:rgba(255,255,255,.65)!important;backdrop-filter:blur(14px)!important;
  border-bottom:1px solid var(--border)!important;
  padding:.6rem 1.5rem!important;font-size:.8rem!important;color:var(--mu)!important;
}
div.breadcrumbs a{color:var(--b1)!important;text-decoration:none!important;font-weight:500!important}
/* ── Sidebar ── */
#nav-sidebar,.toggle-nav-sidebar-column{
  background:rgba(255,255,255,.75)!important;
  border-right:1px solid var(--border)!important;
  backdrop-filter:blur(18px)!important;
  box-shadow:2px 0 14px rgba(22,72,200,.07)!important;
}
.toggle-nav-sidebar{background:transparent!important;border:1px solid var(--border)!important;color:var(--mu)!important;border-radius:7px!important}
/* ── Module captions ── */
#nav-sidebar .module caption,caption{
  background:rgba(22,72,200,.08)!important;border-bottom:1px solid rgba(22,72,200,.15)!important;
  color:var(--b1)!important;font-family:'Sora',sans-serif!important;
  font-size:.7rem!important;font-weight:700!important;letter-spacing:.5px!important;
  text-transform:uppercase!important;padding:.55rem 1rem!important;
}
#nav-sidebar .module table td a,.app-index th a{color:var(--tx)!important;text-decoration:none!important;font-weight:500!important;font-size:.84rem!important}
#nav-sidebar .module table td a:hover,.app-index th a:hover{color:var(--b1)!important}
/* ── Module boxes ── */
.module,.inline-group{
  background:rgba(255,255,255,.72)!important;border:1px solid rgba(255,255,255,.88)!important;
  border-bottom:1px solid var(--border)!important;
  border-radius:14px!important;overflow:hidden!important;
  backdrop-filter:blur(14px)!important;margin-bottom:1.1rem!important;
  box-shadow:var(--sh)!important;
}
/* ── Content ── */
#content{padding:1.5rem!important;background:transparent!important}
#content-main{background:transparent!important}
#content h1{font-family:'Sora',sans-serif!important;font-size:1.35rem!important;font-weight:800!important;color:var(--tx)!important;margin-bottom:1.25rem!important}
/* ── Table ── */
#result_list,#changelist-form .results table{width:100%!important;border-collapse:collapse!important}
#result_list thead th,thead th{
  background:rgba(22,72,200,.06)!important;color:var(--mu)!important;
  font-size:.7rem!important;font-weight:700!important;text-transform:uppercase!important;
  letter-spacing:.45px!important;border-bottom:1px solid rgba(22,72,200,.14)!important;
  padding:.78rem 1rem!important;
}
#result_list thead th a,thead th a{color:var(--mu)!important;text-decoration:none!important}
#result_list thead th.sorted,thead th.sorted{background:rgba(22,72,200,.10)!important}
#result_list thead th.sorted a{color:var(--b1)!important;font-weight:700!important}
#result_list tbody td,tbody td{
  padding:.85rem 1rem!important;border-bottom:1px solid rgba(22,72,200,.07)!important;
  color:var(--tx)!important;font-size:.855rem!important;vertical-align:middle!important;
}
#result_list tbody tr:hover td{background:rgba(22,72,200,.03)!important}
#result_list tbody tr:last-child td{border-bottom:none!important}
#result_list tbody tr.row1,#result_list tbody tr.row2{background:transparent!important}
#result_list tbody tr.selected td{background:rgba(22,72,200,.07)!important}
/* ── Search ── */
#changelist-search input,#searchbar{
  background:rgba(255,255,255,.82)!important;border:1px solid rgba(22,72,200,.20)!important;
  border-radius:8px!important;color:var(--tx)!important;padding:.45rem .9rem!important;
  font-size:.84rem!important;outline:none!important;font-family:'Inter',sans-serif!important;
}
#changelist-search input:focus{border-color:var(--b1)!important;box-shadow:0 0 0 3px rgba(22,72,200,.14)!important}
#changelist .actions{
  background:rgba(255,255,255,.60)!important;border:1px solid var(--border)!important;
  border-radius:10px!important;padding:.6rem 1rem!important;margin-bottom:1rem!important;
}
#changelist .actions select{
  background:rgba(255,255,255,.85)!important;border:1px solid var(--border)!important;
  border-radius:7px!important;color:var(--tx)!important;padding:.35rem .75rem!important;
  font-family:'Inter',sans-serif!important;
}
/* ── Buttons ── */
.button,input[type=submit],input[type=button],.submit-row input,a.button{
  background:var(--grad)!important;color:#fff!important;border:none!important;
  border-radius:8px!important;padding:.48rem 1.05rem!important;
  font-family:'Inter',sans-serif!important;font-size:.84rem!important;font-weight:600!important;
  cursor:pointer!important;text-decoration:none!important;
  box-shadow:0 3px 12px rgba(22,72,200,.35)!important;transition:opacity .15s!important;
}
.button:hover,input[type=submit]:hover{opacity:.88!important}
.button.default,input[type=submit].default{background:linear-gradient(135deg,#047857,#059669)!important;box-shadow:0 3px 12px rgba(4,120,87,.30)!important}
.deletelink,a.deletelink{background:rgba(200,21,21,.10)!important;color:var(--red)!important;border:1px solid rgba(200,21,21,.22)!important;box-shadow:none!important}
.deletelink:hover{background:rgba(200,21,21,.20)!important}
/* ── Form fields ── */
.form-row,.fieldset{border-bottom:1px solid rgba(22,72,200,.07)!important;padding:.85rem 1rem!important}
label{color:var(--mu)!important;font-size:.8rem!important;font-weight:600!important}
input[type=text],input[type=password],input[type=email],input[type=url],
input[type=number],input[type=date],input[type=datetime-local],
textarea,select,.vDateField,.vTimeField{
  background:rgba(255,255,255,.85)!important;border:1px solid rgba(22,72,200,.18)!important;
  border-radius:8px!important;color:var(--tx)!important;padding:.48rem .85rem!important;
  font-family:'Inter',sans-serif!important;font-size:.855rem!important;outline:none!important;
  width:100%!important;max-width:500px!important;
}
input[type=text]:focus,textarea:focus,select:focus{
  border-color:var(--b1)!important;box-shadow:0 0 0 3px rgba(22,72,200,.14)!important;background:#fff!important;
}
textarea{min-height:90px!important}
input[type=checkbox]{accent-color:var(--b1)!important;width:15px!important;height:15px!important}
/* ── Submit row ── */
.submit-row{
  background:rgba(255,255,255,.62)!important;border:1px solid var(--border)!important;
  border-radius:12px!important;padding:.9rem 1.15rem!important;
  display:flex!important;gap:.65rem!important;align-items:center!important;flex-wrap:wrap!important;
}
/* ── Fieldset headings ── */
fieldset.module h2{
  background:rgba(22,72,200,.07)!important;color:var(--b1)!important;
  font-size:.75rem!important;font-weight:700!important;text-transform:uppercase!important;
  letter-spacing:.5px!important;padding:.5rem 1rem!important;
  border-bottom:1px solid rgba(22,72,200,.12)!important;font-family:'Sora',sans-serif!important;
}
/* ── Filter sidebar ── */
#changelist-filter{
  background:rgba(255,255,255,.72)!important;border-left:1px solid var(--border)!important;
  backdrop-filter:blur(14px)!important;min-width:192px!important;
  box-shadow:-2px 0 14px rgba(22,72,200,.07)!important;
}
#changelist-filter h2{
  background:rgba(22,72,200,.07)!important;color:var(--b1)!important;
  font-size:.72rem!important;font-weight:700!important;text-transform:uppercase!important;
  letter-spacing:.5px!important;padding:.55rem 1rem!important;
  border-bottom:1px solid rgba(22,72,200,.12)!important;
}
#changelist-filter h3{color:var(--mu)!important;font-size:.72rem!important;font-weight:700!important;letter-spacing:.4px!important;padding:.45rem 1rem .2rem!important;text-transform:uppercase!important}
#changelist-filter ul{padding:.2rem .5rem!important}
#changelist-filter li a{color:var(--mu)!important;font-size:.82rem!important;text-decoration:none!important;padding:.22rem .5rem!important;border-radius:6px!important;display:block!important;transition:all .15s!important}
#changelist-filter li a:hover{color:var(--b1)!important;background:rgba(22,72,200,.08)!important}
#changelist-filter li.selected a{color:var(--b1)!important;background:rgba(22,72,200,.12)!important;font-weight:700!important}
/* ── Messages ── */
ul.messagelist{padding:0 1.5rem!important}
ul.messagelist li{border-radius:9px!important;padding:.7rem 1rem!important;margin-bottom:.45rem!important;font-size:.84rem!important;font-weight:500!important;border:none!important}
ul.messagelist li.success{background:rgba(4,120,87,.12)!important;color:var(--green)!important;border-left:3px solid var(--green)!important}
ul.messagelist li.warning{background:rgba(180,83,9,.12)!important;color:var(--amber)!important;border-left:3px solid var(--amber)!important}
ul.messagelist li.error{background:rgba(200,21,21,.10)!important;color:var(--red)!important;border-left:3px solid var(--red)!important}
/* ── Pagination ── */
.paginator{background:rgba(255,255,255,.62)!important;border:1px solid var(--border)!important;border-radius:9px!important;padding:.55rem 1rem!important;font-size:.82rem!important;color:var(--mu)!important}
.paginator a{color:var(--b1)!important;font-weight:600!important}
/* ── Object tools ── */
ul.object-tools{float:right!important;margin:0 0 .75rem!important;padding:0!important;display:flex!important;gap:.5rem!important}
ul.object-tools li{list-style:none!important}
ul.object-tools a{background:rgba(22,72,200,.10)!important;border:1px solid rgba(22,72,200,.24)!important;color:var(--b1)!important;border-radius:8px!important;padding:.38rem .85rem!important;font-size:.78rem!important;font-weight:700!important;text-decoration:none!important;transition:all .15s!important}
ul.object-tools a:hover{background:rgba(22,72,200,.20)!important}
/* ── Misc ── */
.help{color:var(--lt)!important;font-size:.75rem!important}
.date-hierarchy{background:rgba(255,255,255,.62)!important;border:1px solid var(--border)!important;border-radius:9px!important;padding:.45rem 1rem!important;margin-bottom:.875rem!important;font-size:.82rem!important}
.date-hierarchy a{color:var(--b1)!important;font-weight:600!important}
.inline-group h2{background:rgba(22,72,200,.07)!important;color:var(--b1)!important;border-bottom:1px solid var(--border)!important}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(22,72,200,.20);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(22,72,200,.36)}
</style>
{% endblock %}

{% extends 'base.html' %}
{% block footer %}{% endblock %}
{% block content %}
<div class="admin-wrap">
  <aside class="admin-side">
    <div class="side-section">
      <div style="padding:.5rem;margin-bottom:1rem;"><div style="font-size:.72rem;font-weight:600;color:var(--text-muted);">Panel Admin</div><div style="font-size:.82rem;color:var(--brand-blue);font-weight:600;">{{ user.username }}</div></div>
      <div class="side-label">Utama</div>
      <a href="{% url 'admin_dashboard' %}" class="side-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="{% url 'admin_event_list' %}" class="side-link {% if 'admin_event' in request.resolver_match.url_name %}active{% endif %}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Kelola Event</a>
      <a href="{% url 'admin_category_list' %}" class="side-link {% if 'admin_category' in request.resolver_match.url_name %}active{% endif %}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M4 6h16M4 12h16M4 18h7"/></svg>Kategori</a>
      <a href="{% url 'admin_registration_list' %}" class="side-link {% if 'admin_registration' in request.resolver_match.url_name %}active{% endif %}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Pendaftar</a>
    </div>
    <div class="side-section">
      <div class="side-label">Lainnya</div>
      <a href="{% url 'landing' %}" class="side-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Lihat Website</a>
      <a href="/django-admin/" class="side-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Django Admin</a>
    </div>
  </aside>
  <main class="admin-main">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% endblock %}

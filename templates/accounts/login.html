{% extends 'base.html' %}
{% block title %}Masuk — ScholarSpace{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><svg viewBox="0 0 24 24" fill="white" width="26" height="26"><path d="M12 2L2 8l10 5 10-5-10-5zM2 16l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="1.5" fill="none"/><rect x="4" y="8" width="16" height="1" fill="white" opacity=".6"/></svg></div>
    <h1 class="auth-title">Selamat Datang</h1>
    <p class="auth-sub">Masuk ke akun ScholarSpace kamu</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group"><label class="form-label">Username</label><input type="text" name="username" class="input-field" required placeholder="Username" autofocus></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="input-field" required placeholder="Password"></div>
      {% if form.errors %}<div class="alert alert-danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg><span>Username atau password salah.</span></div>{% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem;margin-top:.5rem;">Masuk</button>
    </form>
    <div class="auth-divider">atau</div>
    <div class="auth-footer">Belum punya akun? <a href="{% url 'register' %}">Daftar di sini</a></div>
  </div>
</div>
{% endblock %}
